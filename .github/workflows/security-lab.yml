name: acme-security-lab

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - achievements/**

jobs:
  compose-and-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build and start lab
        run: docker compose up -d --build

      - name: Wait for services
        run: sleep 35

      - name: Install tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y nmap curl

      - name: Nmap scan
        run: nmap -Pn -sV -p 8080,8081,8082,9000,9001,3306 127.0.0.1

      - name: Basic security smoke checks
        run: |
          curl -fsS http://127.0.0.1:8080/ | grep -q "Acme Employee Hub"
          curl -fsS http://127.0.0.1:8081/api/user?id=3 | grep -q '"username":"admin"'
          curl -fsS -H 'role: admin' http://127.0.0.1:8082/export | grep -q '"publicBucket":"public-assets"'
          curl -fsS http://127.0.0.1:9000/public-assets/security-note.txt | grep -q 'Acme vendor handoff'

      - name: Tear down
        if: always()
        run: docker compose down -v
