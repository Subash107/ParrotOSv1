name: acme-security-lab

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - achievements/**

jobs:
  compose-and-scan:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - lab_profile: vulnerable
            compose_args: "-f docker-compose.yml"
            report_root: reports/ci-run-vulnerable
          - lab_profile: remediated
            compose_args: "-f docker-compose.yml -f docker-compose.remediated.yml"
            report_root: reports/ci-run-remediated
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build and start lab
        run: docker compose ${{ matrix.compose_args }} up -d --build

      - name: Wait for services
        run: sleep 35

      - name: Install tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y nmap curl

      - name: Nmap scan
        run: nmap -Pn -sV -p 8080,8081,8082,9000,9001,3306 127.0.0.1

      - name: Shared scenario validation
        run: |
          set +e
          python tools/run_lab_scenario.py \
            --report-root ${{ matrix.report_root }} \
            --profile ${{ matrix.lab_profile }} \
            --capture-source live \
            --compose-file docker-compose.yml
          scenario_exit=$?
          set -e
          python tools/generate_windows_test_report.py --report-root ${{ matrix.report_root }}
          python tools/generate_learning_lab_report.py --report-root ${{ matrix.report_root }}
          exit $scenario_exit

      - name: Upload scenario artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-scenario-${{ matrix.lab_profile }}
          path: ${{ matrix.report_root }}

      - name: Tear down
        if: always()
        run: docker compose ${{ matrix.compose_args }} down -v
